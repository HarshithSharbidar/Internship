<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
<form action="">
    <label for="fullname">Name:</form>
    <input type="text" id="name" placeholder="Enter your name" id="fullname" name="fullname" required><br>
    <!--Email-->
    <label for="email">Email Address</label>
    <input for="email" placeholder="Enter your Email Address" name="email" id="name"></input> <br>
    <!--Password-->
    <label for="psw">Password</label>
    <input type="password" placeholder="" minlength="8" name="psw" id="psw"> <br>
    <!--number input-->
    <label for="age">Age</label>
    <input type="number" id="age" name="age" min="18" max="100"><br>
    <!--radio button-->
    <p>Gender</p>
    <input type="radio" id="male" name="gender" value="male">
    <label for="gender">Male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="gender">Female</label>
    <input type="radio" id="trans" name="gender" value="trans">
    <label for="gender">Trans</label>
    <!--checkbox-->
    <p>Technologies</p>
    <input type="checkbox" name="html" id="html" value="html">
    <label for="html">HTML</label><br>
    <input type="checkbox" name="Java" id="Java" value="Java">
    <label for="Java">Java</label><br>
    <input type="checkbox" name="C" id="C" value="C">
    <label for="C">C</label><br>
    <!--dropdown-->
    <label for="country">Country</label>
    <option value="USA">USA</option>
    <option value="USA">USA</option>
    <option value="USA">USA</option>

    <!--fileupload-->
    <label for="resume">Upload your resume</label>
    <input type="file" name="resume" id="resume"> <br>

    <!--text area-->
    <label for="message">Message</label>
    <textarea name="message" id="message" placeholder="Write your soul away"></textarea> <br>

    <!--date picker-->
    <label for="dob">Date of Birth</label>
    <input type="date" name="dob" id="dob">



    <!--button-->
    <br><button type="submit">sumbit</button>
    <button type="reset">reset</button>
</form>
    
</body>
</html>
